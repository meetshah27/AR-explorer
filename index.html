<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Explorer</title>
  <!-- Google Maps MUST be inside head -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_PLACES_API_KEY&libraries=places"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --neon: #00ffe0;
      --neon2: #ff006e;
      --dark: #050a0e;
      --glass: rgba(5, 20, 30, 0.55);
      --glass-border: rgba(0, 255, 224, 0.18);
    }

    body {
      background: var(--dark);
      font-family: 'Syne', sans-serif;
      color: #fff;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
    }

    #camera-feed {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #labels-container {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      overflow: hidden;
    }

    .ar-label {
      position: absolute;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: all;
      cursor: pointer;
      animation: labelPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      filter: drop-shadow(0 0 12px rgba(0,255,224,0.4));
    }

    @keyframes labelPop {
      from { opacity: 0; transform: translate(-50%, -80%) scale(0.7); }
      to   { opacity: 1; transform: translate(-50%, -100%) scale(1); }
    }

    .ar-label-card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 10px 16px;
      min-width: 140px;
      max-width: 200px;
      text-align: center;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .ar-label-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
    }

    .ar-label:hover .ar-label-card {
      background: rgba(0,255,224,0.12);
      border-color: var(--neon);
      transform: scale(1.05);
    }

    .ar-label-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .ar-label-type {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--neon);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.85;
    }

    .ar-label-dist {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.6);
      margin-top: 3px;
    }

    .ar-label-stem {
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom, var(--neon), transparent);
    }

    .ar-label-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 8px var(--neon);
      margin-top: -1px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.6; }
    }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 30;
      padding: 20px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
    }

    #compass-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      pointer-events: all;
    }

    #compass {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #compass-needle {
      width: 3px;
      height: 22px;
      border-radius: 2px;
      background: linear-gradient(to top, rgba(255,255,255,0.3), var(--neon2));
      transform-origin: bottom center;
      position: absolute;
      bottom: 50%;
      left: 50%;
      margin-left: -1.5px;
      transition: transform 0.15s ease;
    }

    #compass-dir {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--neon);
      letter-spacing: 0.1em;
    }

    #app-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.05em;
      color: #fff;
      text-shadow: 0 0 20px rgba(0,255,224,0.5);
    }

    #app-subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--neon);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-align: right;
      opacity: 0.7;
      margin-top: 2px;
    }

    #bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 30;
      padding: 16px 20px 32px;
      background: linear-gradient(to top, rgba(5,10,14,0.9) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #location-info { flex: 1; }

    #location-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--neon);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.7;
    }

    #location-coords {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }

    #places-count {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      color: var(--neon);
      background: rgba(0,255,224,0.08);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 6px 14px;
    }

    #status-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px;
      text-align: center;
    }

    .status-icon {
      font-size: 52px;
      animation: floatIcon 3s ease-in-out infinite;
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .status-title {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--neon));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .status-sub {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      line-height: 1.8;
      max-width: 300px;
    }

    .status-btn {
      background: var(--neon);
      color: var(--dark);
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 30px rgba(0,255,224,0.3);
    }

    .status-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 0 50px rgba(0,255,224,0.5);
    }

    #detail-card {
      position: fixed;
      bottom: 90px;
      left: 20px; right: 20px;
      z-index: 50;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      display: none;
      animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #detail-card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
    }

    #detail-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }

    #detail-meta {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--neon);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    #detail-dist-bar {
      background: rgba(0,255,224,0.08);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #detail-dist-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #detail-dist-val {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: var(--neon);
    }

    #detail-close {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    #scan-line {
      position: fixed;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      z-index: 15;
      opacity: 0.4;
      animation: scanMove 4s linear infinite;
      pointer-events: none;
    }

    @keyframes scanMove {
      0%   { top: 0%; }
      100% { top: 100%; }
    }

    .corner {
      position: fixed;
      z-index: 15;
      width: 30px; height: 30px;
      pointer-events: none;
      opacity: 0.4;
    }
    .corner-tl { top: 80px; left: 16px; border-top: 2px solid var(--neon); border-left: 2px solid var(--neon); }
    .corner-tr { top: 80px; right: 16px; border-top: 2px solid var(--neon); border-right: 2px solid var(--neon); }
    .corner-bl { bottom: 80px; left: 16px; border-bottom: 2px solid var(--neon); border-left: 2px solid var(--neon); }
    .corner-br { bottom: 80px; right: 16px; border-bottom: 2px solid var(--neon); border-right: 2px solid var(--neon); }

    #debug-panel {
      display: none;
      position: fixed;
      top: 100px; left: 16px;
      z-index: 99;
      background: rgba(0,0,0,0.85);
      border: 1px solid var(--neon);
      border-radius: 10px;
      padding: 12px;
      font-family: monospace;
      font-size: 11px;
      color: var(--neon);
      line-height: 1.8;
      max-width: 260px;
      pointer-events: none;
    }

    #debug-toggle {
      display: none;
      position: fixed;
      bottom: 100px; right: 16px;
      z-index: 99;
      background: rgba(0,255,224,0.1);
      border: 1px solid rgba(0,255,224,0.3);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--neon);
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>
<div id="scan-line"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div id="hud">
  <div id="compass-wrap">
    <div id="compass"><div id="compass-needle"></div></div>
    <div id="compass-dir">N</div>
  </div>
  <div>
    <div id="app-title">AR Explorer</div>
    <div id="app-subtitle">Point. Discover. Explore.</div>
  </div>
</div>

<div id="labels-container"></div>

<div id="bottom-bar">
  <div id="location-info">
    <div id="location-label">Your Location</div>
    <div id="location-coords">Acquiring GPS...</div>
  </div>
  <div id="places-count">0 places</div>
</div>

<div id="detail-card">
  <button id="detail-close">✕</button>
  <div id="detail-name">–</div>
  <div id="detail-meta">–</div>
  <div id="detail-dist-bar">
    <span id="detail-dist-label">Distance</span>
    <span id="detail-dist-val">–</span>
  </div>
</div>

<div id="debug-panel"></div>
<button id="debug-toggle">🔍 Debug</button>

<div id="status-screen">
  <div class="status-icon">🔭</div>
  <div class="status-title">AR Explorer</div>
  <div class="status-sub">
    Point your camera at buildings around you and instantly discover what they are.
    <br><br>
    We need access to your <strong style="color:#00ffe0">camera</strong>, <strong style="color:#00ffe0">location</strong>, and <strong style="color:#00ffe0">compass</strong>.
  </div>
  <button class="status-btn" id="start-btn">Start Exploring</button>
  <div class="status-sub" style="font-size:10px; opacity:0.4; margin-top:-8px">
    All data stays on your device. Nothing is stored.
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let userLat = null, userLng = null;
let heading = 0;
let places  = [];
let labelEls = {};
let orientationWorking = false;
let debugVisible = false;
const HFOV = 120; // wide so labels are easy to see while testing

// ─────────────────────────────────────────────
//  MATH
// ─────────────────────────────────────────────
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearing(lat1, lng1, lat2, lng2) {
  const dLng = toRad(lng2 - lng1);
  const x = Math.sin(dLng) * Math.cos(toRad(lat2));
  const y = Math.cos(toRad(lat1))*Math.sin(toRad(lat2)) - Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(dLng);
  return (toDeg(Math.atan2(x, y)) + 360) % 360;
}

function angleDiff(a, b) {
  let d = ((a - b) + 180) % 360 - 180;
  if (d < -180) d += 360;
  return d;
}

function formatDist(m) {
  return m >= 1000 ? (m/1000).toFixed(1)+' km' : Math.round(m)+' m';
}

function directionLabel(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW','N'];
  return dirs[Math.round(deg / 45) % 8];
}

// ─────────────────────────────────────────────
//  FETCH PLACES
// ─────────────────────────────────────────────
function fetchPlaces(lat, lng) {
  const service = new google.maps.places.PlacesService(document.createElement('div'));
  service.nearbySearch({ location: { lat, lng }, radius: 500 }, (results, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK && results) {
      places = results.slice(0, 15).map(p => ({
        name:    p.name,
        type:    (p.types?.[0] || 'place').replace(/_/g, ' '),
        lat:     p.geometry.location.lat(),
        lng:     p.geometry.location.lng(),
        dist:    haversine(lat, lng, p.geometry.location.lat(), p.geometry.location.lng()),
        bearing: bearing(lat, lng, p.geometry.location.lat(), p.geometry.location.lng()),
      }));
      document.getElementById('places-count').textContent = places.length + ' places';
    } else {
      console.warn('Places API status:', status);
      document.getElementById('places-count').textContent = 'API error: ' + status;
    }
  });
}

// ─────────────────────────────────────────────
//  RENDER LABELS
// ─────────────────────────────────────────────
const labelsContainer = document.getElementById('labels-container');

function renderLabels() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const visibleIds = new Set();

  places.forEach((p, i) => {
    const id = 'place-' + i;
    const diff = angleDiff(p.bearing, heading);

    if (Math.abs(diff) > HFOV / 2) {
      if (labelEls[id]) { labelEls[id].remove(); delete labelEls[id]; }
      return;
    }

    visibleIds.add(id);
    const x = W/2 + (diff / (HFOV/2)) * (W/2);
    const distRatio = Math.min(p.dist, 1000) / 1000;
    const y = H * 0.35 + distRatio * H * 0.25;

    if (!labelEls[id]) {
      const el = document.createElement('div');
      el.className = 'ar-label';
      el.id = id;
      el.innerHTML = `
        <div class="ar-label-card">
          <div class="ar-label-name">${p.name}</div>
          <div class="ar-label-type">${p.type}</div>
          <div class="ar-label-dist">${formatDist(p.dist)}</div>
        </div>
        <div class="ar-label-stem"></div>
        <div class="ar-label-dot"></div>
      `;
      el.addEventListener('click', () => showDetail(p));
      labelsContainer.appendChild(el);
      labelEls[id] = el;
    }

    labelEls[id].style.left = x + 'px';
    labelEls[id].style.top  = y + 'px';
  });

  Object.keys(labelEls).forEach(id => {
    if (!visibleIds.has(id)) { labelEls[id].remove(); delete labelEls[id]; }
  });

  updateDebug();
  requestAnimationFrame(renderLabels);
}

// ─────────────────────────────────────────────
//  DETAIL CARD
// ─────────────────────────────────────────────
function showDetail(p) {
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-meta').textContent = p.type.toUpperCase() + ' · ' + directionLabel(p.bearing);
  document.getElementById('detail-dist-val').textContent = formatDist(p.dist);
  document.getElementById('detail-card').style.display = 'block';
}

document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail-card').style.display = 'none';
});

// ─────────────────────────────────────────────
//  COMPASS
// ─────────────────────────────────────────────
function updateCompass(h) {
  document.getElementById('compass-needle').style.transform = `rotate(${-h}deg)`;
  document.getElementById('compass-dir').textContent = directionLabel(h);
}

// ─────────────────────────────────────────────
//  ORIENTATION — iOS + Android
// ─────────────────────────────────────────────
function initOrientation() {
  function handleOrientation(e) {
    let h = null;

    if (typeof e.webkitCompassHeading === 'number') {
      // iOS — most accurate
      h = e.webkitCompassHeading;
    } else if (e.absolute === true && typeof e.alpha === 'number') {
      // Android absolute
      h = (360 - e.alpha) % 360;
    } else if (typeof e.alpha === 'number') {
      // Android fallback
      h = (360 - e.alpha) % 360;
    }

    if (h !== null) {
      heading = h;
      orientationWorking = true;
      updateCompass(h);
    }
  }

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+ — must request permission
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation, true);
        }
      })
      .catch(console.error);
  } else {
    // Android
    window.addEventListener('deviceorientationabsolute', handleOrientation, true);
    window.addEventListener('deviceorientation', handleOrientation, true);
  }

  // If compass never fires, slowly rotate so labels appear anyway
  setInterval(() => {
    if (!orientationWorking) {
      heading = (heading + 1) % 360;
      updateCompass(heading);
    }
  }, 100);
}

// ─────────────────────────────────────────────
//  GPS
// ─────────────────────────────────────────────
function initGPS() {
  if (!navigator.geolocation) {
    document.getElementById('location-coords').textContent = 'GPS not supported';
    return;
  }
  navigator.geolocation.watchPosition(
    pos => {
      const { latitude: lat, longitude: lng } = pos.coords;
      const firstFix = userLat === null;
      userLat = lat; userLng = lng;
      document.getElementById('location-coords').textContent = lat.toFixed(5) + ', ' + lng.toFixed(5);
      if (firstFix) fetchPlaces(lat, lng);
      places.forEach(p => {
        p.dist    = haversine(lat, lng, p.lat, p.lng);
        p.bearing = bearing(lat, lng, p.lat, p.lng);
      });
    },
    err => {
      console.warn('GPS:', err.message);
      document.getElementById('location-coords').textContent = 'GPS unavailable';
    },
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
  );
}

// ─────────────────────────────────────────────
//  CAMERA
// ─────────────────────────────────────────────
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }, audio: false
    });
    document.getElementById('camera-feed').srcObject = stream;
  } catch(e) {
    console.warn('Camera:', e.message);
  }
}

// ─────────────────────────────────────────────
//  DEBUG
// ─────────────────────────────────────────────
function updateDebug() {
  if (!debugVisible) return;
  const topPlaces = places.slice(0, 4).map(p =>
    `· ${p.name.slice(0,18)} @ ${p.bearing.toFixed(0)}° (${formatDist(p.dist)})`
  ).join('<br>');
  document.getElementById('debug-panel').innerHTML = `
    <b>Heading:</b> ${heading.toFixed(1)}°<br>
    <b>Compass:</b> ${orientationWorking ? '✅ working' : '⏳ waiting...'}<br>
    <b>GPS:</b> ${userLat ? userLat.toFixed(5)+', '+userLng.toFixed(5) : '⏳ waiting...'}<br>
    <b>Places:</b> ${places.length}<br>
    <b>Labels visible:</b> ${Object.keys(labelEls).length}<br>
    <b>FOV:</b> ${HFOV}°<br><br>
    ${topPlaces}
  `;
}

document.getElementById('debug-toggle').addEventListener('click', () => {
  debugVisible = !debugVisible;
  document.getElementById('debug-panel').style.display = debugVisible ? 'block' : 'none';
  updateDebug();
});

// ─────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', async () => {
  document.getElementById('status-screen').style.display = 'none';
  document.getElementById('debug-toggle').style.display = 'block';
  await initCamera();
  initGPS();
  initOrientation();
  renderLabels();
});
</script>
</body>
</html>
